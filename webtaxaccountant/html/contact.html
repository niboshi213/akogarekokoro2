        <section>
            <p class="text1">まずはご気軽にお問合せ下さい、お電話又はメールで承っております。ご依頼に関する初回面談は無料です。</p>
        </section>
            <h1 class="phone1">0120-***-****</h1>
            <p class="text2">受付時間　平日9：00～18：00/祝日除く</p>

            <form>
                <h2>
                    <label>名前<span class="required">（必須）</span>：<input type="text" name="namae" placeholder="山田　太郎" required></label>
                </h2>
                <h2>
                    <label>フリガナ<span class="required">（必須）</span>：<input type="text" name="hurigana" placeholder="ヤマダ　タロウ" required></label>
                </h2>
                <h2>
                    <label>会社名<span class="required2">（任意）</span>：<input type="text" name="usercompany" placeholder="株式会社〇〇"></label>
                </h2>
                <h2>
                    <label>住所<span class="required2">（任意）</span>：<input type="text" name="useraddress" placeholder="滋賀県草津市"></label>
                </h2>
                <h2>
                    <label>電話番号<span class="required2">（任意）</span>：<input type="tel" name="usertel" placeholder="090-***-***"></label>
                </h2>
                <h2>
                    <label>メールアドレス<span class="required">（必須）</span>：<input type="email"name="usermail" placeholder="*****@gmail.com" required></label>
                </h2>
                <h2>
                    <label>郵便番号<span class="required2">（任意）</span>：<input type="text" name="userpostal" placeholder="***-****"></label>
                </h2>
                <h2 class="checkbox">
                    <label>お問い合わせ項目<span class="required">（必須）</span>（複数回答可）：<input type="checkbox" name="course" value="kigyou" required>会社開業について
                                                                <input type="checkbox" name="course" value="sonota" required>その他
                                                                
                    </label>
                </h2>
                <h2>
                    <label>お問い合わせ内容（必須）<textarea name="usercomment" placeholder="出来るだけ具体的な内容を入力してください。" required></textarea></label>
                </h2>
                <h1 class="soushin">
                    <button type="submit" name="soushin">送信</button>
                </h1>
            </form>
